<section class="wrap" *ngIf="product; else nf">
  <a routerLink="/" class="back">← Back</a>
  <h2>{{ product.name }}</h2>
  <p>{{ product.description }}</p>
  <p class="price">{{ product.price | number }} ₸</p>
  <a class="btn" [href]="product.link" target="_blank" rel="noopener noreferrer">Open on Kaspi</a>
</section>

<ng-template #nf>
  <section class="wrap">
    <a routerLink="/" class="back">← Back</a>
    <h2>Product not found</h2>
  </section>
</ng-template>
